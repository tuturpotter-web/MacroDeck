name: Build Imperium

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial psutil keyboard mouse
          pip install pywin32 comtypes pycaw WMI

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Inject version
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          (Get-Content imperium_app.py) -replace '^APP_VERSION = "dev"', "APP_VERSION = `"$v`"" | Set-Content imperium_app.py
          Write-Host "APP_VERSION injected: $v"

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onedir `
            --noconsole `
            --name Imperium `
            --hidden-import win32gui `
            --hidden-import win32process `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pycaw.pycaw `
            --hidden-import comtypes `
            --hidden-import wmi `
            --hidden-import serial `
            --hidden-import serial.tools.list_ports `
            --hidden-import keyboard `
            --hidden-import mouse `
            --hidden-import tkinter `
            imperium_app.py

      - name: Inject version into installer.iss
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          (Get-Content installer.iss) -replace '#define MyAppVersion\s+"[^"]+"', "#define MyAppVersion `"$v`"" | Set-Content installer.iss

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (!$iscc) { Write-Error "Inno Setup introuvable"; exit 1 }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperium-Setup
          path: installer_output/Imperium_Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: installer_output/Imperium_Setup.exe
          name: Imperium v${{ steps.version.outputs.version }}
          body: |
            ## Imperium v${{ steps.version.outputs.version }} — build #${{ github.run_number }}

            Compilé depuis le commit ${{ github.sha }}

            ### Installation
            1. Télécharge `Imperium_Setup.exe`
            2. Lance-le et suis le wizard
            3. Imperium s'installe dans `Program Files`

            ### Nouveautés
            - Application Windows native (plus de navigateur)
            - Interface tkinter entièrement dark
            - Zéro dépendance navigateur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
